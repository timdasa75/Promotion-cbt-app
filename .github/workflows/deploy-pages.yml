name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate taxonomy integrity and metadata coverage
        run: python3 scripts/validate_taxonomy.py --strict-duplicates --strict-metadata

      - name: Run unit tests
        run: npm run test:unit

      - name: Validate required Firebase secrets
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          ADMIN_API_BASE_URL: ${{ secrets.ADMIN_API_BASE_URL }}
        run: |
          missing=0
          for key in FIREBASE_API_KEY FIREBASE_PROJECT_ID FIREBASE_AUTH_DOMAIN ADMIN_API_BASE_URL; do
            if [ -z "${!key}" ]; then
              echo "::error::Missing required repository secret: ${key}"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Generate runtime auth config from secrets
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          ADMIN_API_BASE_URL: ${{ secrets.ADMIN_API_BASE_URL }}
        run: |
          cat > config/runtime-auth.js <<EOF
          // Generated during GitHub Pages deploy. Do not commit live values.
          window.PROMOTION_CBT_AUTH = {
            firebaseApiKey: "${FIREBASE_API_KEY}",
            firebaseProjectId: "${FIREBASE_PROJECT_ID}",
            firebaseAuthDomain: "${FIREBASE_AUTH_DOMAIN}",
            adminApiBaseUrl: "${ADMIN_API_BASE_URL}",
          };
          EOF

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4


